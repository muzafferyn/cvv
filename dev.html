        .snow-container {

        }

        .snow {
            position: absolute;
            will-change: transform;
            mix-blend-mode: lighten;
            transition: opacity 0.3s;
            opacity: 0.85;
        }

        @keyframes bubble-snow-fall {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            80% {
                opacity: 0.85;
            }

            100% {
                transform: translateY(100vh) scale(1.1);

            }
        }
